name: Sync main → staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward staging to main (or merge if diverged)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create staging branch locally tracking remote
          git fetch origin staging || true
          if git show-ref --verify --quiet refs/remotes/origin/staging; then
            git checkout -B staging origin/staging
          else
            echo "staging branch does not exist — creating from main"
            git checkout -B staging main
            git push origin staging
            exit 0
          fi

          # Try fast-forward first
          if git merge --ff-only main; then
            echo "Fast-forward merge succeeded"
          else
            echo "Branches diverged — doing a merge commit"
            if ! git merge --no-edit main; then
              echo "::error::Conflict between main and staging. Resolve manually."
              exit 1
            fi
          fi

          git push origin staging
