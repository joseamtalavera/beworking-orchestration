name: Deploy CloudFormation Stacks

on:
  push:
    branches: [main]
    paths:
      - 'infra/**.yml'
      - 'infra/**.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging-scaling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-north-1

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/staging-scaling.yml \
            --region eu-north-1

      - name: Extract template parameter defaults
        id: params
        run: |
          # CFN's `deploy` reuses previous stored parameter values when not
          # overridden, ignoring updated template defaults. Read each parameter
          # default from the YAML and pass it explicitly so changes always apply.
          SCALE_UP=$(awk '/^  ScaleUpCron:/{f=1;next} f&&/Default:/{sub(/^[^:]*: */,""); print; exit}' infra/staging-scaling.yml)
          SCALE_DOWN=$(awk '/^  ScaleDownCron:/{f=1;next} f&&/Default:/{sub(/^[^:]*: */,""); print; exit}' infra/staging-scaling.yml)
          TIMEZONE=$(awk '/^  Timezone:/{f=1;next} f&&/Default:/{sub(/^[^:]*: */,""); print; exit}' infra/staging-scaling.yml)
          echo "scale_up=$SCALE_UP"     >> "$GITHUB_OUTPUT"
          echo "scale_down=$SCALE_DOWN" >> "$GITHUB_OUTPUT"
          echo "timezone=$TIMEZONE"     >> "$GITHUB_OUTPUT"
          echo "Using ScaleUpCron=$SCALE_UP ScaleDownCron=$SCALE_DOWN Timezone=$TIMEZONE"

      - name: Deploy staging-scaling stack
        run: |
          aws cloudformation deploy \
            --template-file infra/staging-scaling.yml \
            --stack-name beworking-staging-scaling \
            --parameter-overrides \
              "ScaleUpCron=${{ steps.params.outputs.scale_up }}" \
              "ScaleDownCron=${{ steps.params.outputs.scale_down }}" \
              "Timezone=${{ steps.params.outputs.timezone }}" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --region eu-north-1
